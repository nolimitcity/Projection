name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows triggering manually from the GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "--- Pulling latest code ---"
            git pull --ff-only origin main

            echo "--- Installing production dependencies ---"
            npm ci --omit=dev

            echo "--- Building ---"
            npm run build

            echo "--- Reloading app process ---"
            pm2 reload ${{ secrets.PM2_APP_NAME || 'projection' }} --update-env

            echo "--- Done ---"
