<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projection</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const key = 'projection_theme_mode';
        const stored = localStorage.getItem(key);
        const mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        const systemTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = mode === 'system' ? systemTheme : mode;
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle-floating" type="button" aria-label="Toggle light and dark theme" title="Toggle theme"><svg class="theme-toggle-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle class="theme-sun" cx="12" cy="12" r="4"></circle><path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke-width="1.7" stroke-linecap="round"/></svg></button>
    <div class="bg-shape bg-a"></div>
    <div class="bg-shape bg-b"></div>
    <main class="shell">
      <section class="panel" style="max-width: 520px; margin: 8vh auto 0;">
        <h1 style="margin-top: 0;">Projection Login</h1>
        <p class="meta">Sign in with your company Google account to access the planning workspace.</p>
        <div id="loginGoogleButton" style="margin: 0.8rem 0;"></div>
        <p id="loginStatus" class="meta">Loading login configuration...</p>
      </section>
    </main>
    <script src="/login.js" type="module"></script>
  </body>
</html>
